name: Governance

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: customerservice-governance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Standards Alignment
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Prepare SDKWork source dependencies
        env:
          SDKWORK_RELEASE_TOKEN: ${{ secrets.SDKWORK_RELEASE_TOKEN || github.token }}
        run: pnpm run workflow:prepare-ci-dependencies

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify standards alignment
        run: pnpm verify

  postgres-integration:
    name: Postgres Repository Integration
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sdkwork_customerservice
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sdkwork_customerservice"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      CUSTOMER_SERVICE_DATABASE_URL: postgres://postgres:postgres@localhost:5432/sdkwork_customerservice
      CUSTOMER_SERVICE_DATABASE_ENGINE: postgres
      SDKWORK_CUSTOMER_SERVICE_DATABASE_AUTO_MIGRATE: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Prepare SDKWork source dependencies
        env:
          SDKWORK_RELEASE_TOKEN: ${{ secrets.SDKWORK_RELEASE_TOKEN || github.token }}
        run: pnpm run workflow:prepare-ci-dependencies

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Bootstrap PostgreSQL schema
        run: pnpm db:bootstrap

      - name: Postgres repository integration tests
        run: pnpm test:postgres
