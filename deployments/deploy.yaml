version: 1
defaultProfile: cloud.split-services.production

profiles:
  cloud.split-services.production:
    install:
      layout: binary-package
    expose:
      - domain: customerservice.sdkwork.com
        tls: sdkwork.com
        mode: web+api
        web: pc
      - domain: m.customerservice.sdkwork.com
        tls: sdkwork.com
        mode: web
        web: h5
    packages: []

  standalone.unified-process.development:
    expose:
      - domain: localhost
        tls: off
        mode: web+api
        web: pc
      - domain: localhost
        tls: off
        mode: web
        web: h5
    packages: []

  standalone.unified-process.production:
    install:
      layout: binary-package
    expose:
      - domain: customerservice.local
        tls: off
        mode: web+api
        web: pc
      - domain: m.customerservice.local
        tls: off
        mode: web
        web: h5
    packages: []

  cloud.split-services.development:
    expose:
      - domain: localhost
        tls: off
        mode: web+api
        web: pc
      - domain: localhost
        tls: off
        mode: web
        web: h5
    packages: []
